spring.application.name=AuraPay

# Render injects $PORT; fall back to 9090 locally
server.port=${PORT:9090}

# Database — use environment variables for production (e.g., on Render)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:microbank}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Use MySQL dialect if using MySQL, or let Hibernate detect it
spring.jpa.database-platform=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# Disable H2 console in production
spring.h2.console.enabled=false

# JWT — override JWT_SECRET via Render env var
jwt.secret=${JWT_SECRET:3f8a2b1c9d4e7f6a0b5c8d2e1f4a7b3c9d6e2f5a8b1c4d7e0f3a6b9c2d5e8f1a}
jwt.expiration=86400000
